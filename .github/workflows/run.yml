name: job-hunter

on:
  schedule:
    # 03:30 UTC = 09:00 IST, 13:30 UTC = 19:00 IST
    - cron: "30 3,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: job-hunter-run
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write profile and resume from secrets
        env:
          PROFILE_YAML: ${{ secrets.PROFILE_YAML }}
          RESUME_MD: ${{ secrets.RESUME_MD }}
        run: |
          mkdir -p profiles
          printf '%s' "$PROFILE_YAML" > profiles/richa.yaml
          printf '%s' "$RESUME_MD" > profiles/richa_resume.md

      # LinkedIn blocks datacenter IPs so the scrape almost always returns 0 jobs.
      # We run it anyway (continues-on-error) and use the committed ingest file
      # from your local machine if the live scrape fails.
      - name: Scrape LinkedIn (guest API) to ingest file
        continue-on-error: true
        run: |
          mkdir -p data
          python -m job_hunter.cli_linkedin_scrape --root . --out data/linkedin_ingest.json --fast || true
          # If scrape produced nothing but a committed ingest file exists, keep the committed one
          count=$(python3 -c "import json,sys; d=json.load(open('data/linkedin_ingest.json')); print(len(d))" 2>/dev/null || echo 0)
          echo "LinkedIn ingest jobs: $count"
        env:
          LINKEDIN_MAX_PAGES: "5"

      - name: Run job hunter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          LINKEDIN_INGEST_PATH: data/linkedin_ingest.json
        run: python -m job_hunter.main

      - name: Commit updated state
        run: |
          git config user.name "job-hunter-bot"
          git config user.email "job-hunter-bot@users.noreply.github.com"
          git add state.db
          # Also commit LinkedIn ingest if it got jobs this run
          if python3 -c "import json; d=json.load(open('data/linkedin_ingest.json')); exit(0 if d else 1)" 2>/dev/null; then
            git add data/linkedin_ingest.json
          fi
          if [[ -n "$(git diff --cached)" ]]; then
            git commit -m "chore: update state [skip ci]"
            git push
          fi
